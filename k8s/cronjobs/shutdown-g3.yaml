apiVersion: batch/v1
kind: CronJob
metadata:
  name: shutdown-g3
  namespace: default
spec:
  schedule: "0 23 * * *"
  timeZone: "Europe/Warsaw"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: shutdown-sa
          containers:
          - name: shutdown
            image: alpine:latest
            command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache openssh-client
              ssh -o StrictHostKeyChecking=no \
                  -i /root/.ssh/id_ed25519 \
                  buth11@192.168.50.13 \
                  "sudo shutdown -h now"
            volumeMounts:
            - name: ssh-key
              mountPath: /root/.ssh
              readOnly: true
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/hostname: pi4-master
          volumes:
          - name: ssh-key
            hostPath:
              path: /home/buth11/.ssh
              type: Directory
