apiVersion: v1
kind: Service
metadata:
  name: dashboard-backend
  namespace: dashboard
spec:
  selector:
    app: dashboard-backend
  ports:
  - port: 8000
    targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-frontend
  namespace: dashboard
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.50.58"
spec:
  type: LoadBalancer
  selector:
    app: dashboard-frontend
  ports:
  - port: 80
    targetPort: 80
