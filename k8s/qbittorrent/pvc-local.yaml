# Local-path PVCs for state pinned to g3-worker3 (config, Firefox profile).
# Downloads live on TrueNAS (tank-bulk/downloads) instead -- see
# storageclass-downloads.yaml -- so they're reachable from FileBrowser too
# and aren't tied to this one node's local disk.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-config-local
  namespace: qbittorrent
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
# Firefox/noVNC profile (bookmarks, session, history) -- was emptyDir and lost
# on every pod restart until 2026-07-11/12.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-firefox-config
  namespace: qbittorrent
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
