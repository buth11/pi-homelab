# Replaces the original qbittorrent-config-nas / qbittorrent-downloads-nas PVCs
# (backed by the now-decommissioned ASUS router SMB share, nas-smb StorageClass).
# qBittorrent and its Firefox/noVNC sidecar are pinned to g3-worker3 via
# nodeSelector, so local-path is sufficient — no network storage is needed.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-config-local
  namespace: qbittorrent
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-downloads-local
  namespace: qbittorrent
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 100Gi
---
# Firefox/noVNC profile (bookmarks, session, history) — was emptyDir and lost
# on every pod restart until 2026-07-11/12.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-firefox-config
  namespace: qbittorrent
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
