# qBittorrent working directory for active downloads, kept deliberately
# separate from the curated Jellyfin media library (tank-bulk/media) so
# incomplete/in-progress torrents never get scanned by Jellyfin. Same SMB
# service account (k3s-smb) and credentials secret as smb-tank-fast.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: smb-tank-bulk-downloads
provisioner: smb.csi.k8s.io
parameters:
  source: "//192.168.50.21/downloads"
  csi.storage.k8s.io/node-stage-secret-name: smb-tank-fast-secret
  csi.storage.k8s.io/node-stage-secret-namespace: kube-system
reclaimPolicy: Retain
volumeBindingMode: Immediate
mountOptions:
  - dir_mode=0777
  - file_mode=0777
  - uid=1000
  - gid=1000
  - vers=2.0
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-downloads-tank-bulk
  namespace: qbittorrent
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: smb-tank-bulk-downloads
  resources:
    requests:
      storage: 500Gi
